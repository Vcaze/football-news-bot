name: Generator - Fetch News and Queue Tweet

on:
  schedule:
    - cron: '0 6-22 * * *' # Every hour from 06:00-22:00 UTC (= 08:00-00:00 CEST)
  workflow_dispatch: # Allow manual triggering

jobs:
  fetch_and_generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state back to json
      issues: write # Needed to create email alerts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Generator Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python run_generator.py

      - name: Commit queue state
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add queue.json history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: updated queue state" && git push)

      - name: Wait 10 minutes (cancellation window)
        run: sleep 600

      - name: Re-checkout to get latest state (in case user cancelled)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Run Publisher Script
        env:
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python run_publisher.py

      - name: Commit final state
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add queue.json history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: pushed posts to history" && git push)

