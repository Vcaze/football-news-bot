name: Generator - Fetch News and Queue Tweet

on:
  schedule:
    - cron: '0 * * * *' # Every hour at minute 0
  workflow_dispatch: # Allow manual triggering

jobs:
  fetch_and_generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state back to json
      issues: write # Needed to create email alerts
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Generator Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_generator.py
        
      - name: Commit state changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add queue.json history.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: updated queue state" && git push)
